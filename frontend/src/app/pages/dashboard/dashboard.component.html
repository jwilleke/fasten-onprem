<div class="az-content az-content-dashboard">
  <div class="container-fluid px-3 px-lg-4 dashboard-page">
    <div class="az-content-body">

      <div class="d-flex flex-wrap align-items-center gap-3 dashboard-header">
        <div class="me-auto">
          <h2 class="dashboard-title mb-1">Your Health Record</h2>
          <p class="dashboard-subtitle mb-0">Everything imported from your medical sources, in one place.</p>
        </div>
        <div class="text-end dashboard-meta" *ngIf="lastUpdated">
          <label class="mb-0">Last updated</label>
          <h6 class="mb-0">{{lastUpdated | date:'MMM d, yyyy'}}</h6>
        </div>
        <a [routerLink]="'/sources'" class="btn btn-primary">Add Records</a>
      </div>

      <section class="dashboard-section" aria-labelledby="browse-heading">
        <div class="d-flex flex-wrap align-items-center gap-2">
          <div class="me-auto">
            <h4 id="browse-heading" class="section-title">Browse Your Records</h4>
            <p class="section-subtitle">Each category opens its full list of records.</p>
          </div>
          <button *ngIf="customizing && hasCustomOrder" type="button" class="btn btn-sm btn-outline-secondary" (click)="resetTileOrder()">
            <i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Reset to default
          </button>
          <button type="button" class="btn btn-sm" [class.btn-outline-primary]="!customizing" [class.btn-primary]="customizing" (click)="toggleCustomizing()">
            <i class="fa-solid" [class.fa-up-down-left-right]="!customizing" [class.fa-check]="customizing" aria-hidden="true"></i>
            {{customizing ? 'Done' : 'Customize layout'}}
          </button>
        </div>

        <p *ngIf="customizing" class="customize-hint" role="status">Drag the tiles into the order you want. Your order is saved automatically.</p>

        <div class="tile-grid"
             cdkDropList
             cdkDropListOrientation="mixed"
             [cdkDropListDisabled]="!customizing"
             (cdkDropListDropped)="onTileDrop($event)">
          <button *ngFor="let tile of tiles"
                  cdkDrag
                  type="button"
                  class="tile"
                  [class.tile-customizing]="customizing"
                  [attr.aria-label]="tile.label + ' — ' + tile.count + ' records'"
                  (click)="openTile(tile)">
            <i class="tile-icon {{tile.icon}}" aria-hidden="true"></i>
            <span class="tile-count" [class.tile-count-zero]="tile.count === 0">{{tile.count}}</span>
            <span class="tile-label">{{tile.label}}</span>
            <span class="tile-clinical">{{tile.clinicalLabel}}</span>
          </button>
        </div>
      </section>

    </div>
  </div>
</div>
