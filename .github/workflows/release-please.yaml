name: release-please

# Manually-triggered SemVer releases driven by Conventional Commits (closes #91).
#
# This does NOT run on push. A maintainer runs it on demand (Actions tab ->
# release-please -> "Run workflow"). It then opens/updates a single "release PR"
# that rolls every conventional commit since the last release into CHANGELOG.md.
# Merging that PR creates the git tag (vX.Y.Z) AND a GitHub Release. Nothing is
# released until you merge the PR, so release cadence is entirely in your hands.
#
# Bump policy: `versioning: always-bump-minor` in release-please-config.json means
# every release bumps AT LEAST the minor version (e.g. 1.1.3 -> 1.2.0), even a
# fix-only release. We deliberately do not cut a release per fix. A MAJOR bump for
# a breaking change is NOT automatic under this policy — make a commit with a
# `Release-As: 2.0.0` footer when you intend a major.
#
# NOTE (one-time repo setting): Settings -> Actions -> General -> Workflow permissions
# must have "Allow GitHub Actions to create and approve pull requests" enabled (done),
# or the release PR cannot be opened.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
