# Codecov configuration. Coverage here is INFORMATIONAL — a map of untested code, never a gate.
# Nothing in CI is blocked by a coverage change. https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        target: auto
        informational: true   # report project coverage, never fail the PR
    patch:
      default:
        informational: true   # report diff coverage, never fail the PR

comment:
  layout: "reach, diff, flags, files"
  require_changes: true       # only post a PR comment when coverage actually changes

# Per-component coverage (uploaded with these flags in .github/workflows/ci.yaml).
flags:
  backend:
    paths:
      - backend/
  frontend:
    paths:
      - frontend/src/

# Exclude generated, vendored, test, and fixture code so the % reflects hand-written logic.
ignore:
  - "backend/pkg/models/database/fhir_*.go"   # generated by go generate (search-parameters)
  - "backend/pkg/models/patient-access-brands" # tygo-generated TS types
  - "**/*_test.go"
  - "**/*.spec.ts"
  - "**/*.stories.ts"
  - "frontend/src/lib/fixtures/**"
  - "fasten-sources-stub/**"
  - "vendor/**"
